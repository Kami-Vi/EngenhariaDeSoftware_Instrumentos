<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MúsicaPro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<div class="header">
    <div class="logo-area">
        <img src="logo.png" alt="Logo">
    </div>
    <div class="titulo-header">Cadastro de Vendas</div>
    <a id="voltar" href="./index.html">Voltar ao início</a>
</div>

<div class="container">

  
    <div class="left card">

        <h3>Nova venda</h3>

        <form action="salvar_venda.php" method="POST">


            <label>Produto:</label>
            <select id="produto">
                <option value="">Selecione</option>
                <option value="1" data-preco="3500">Notebook</option>
                <option value="2" data-preco="50">Mouse</option>
                <option value="3" data-preco="120">Teclado</option>
            </select>

            <label>Quantidade:</label>
            <input type="number" id="quantidade" min="1">

            <!-- BOTÃO ADICIONAR -->
            <button type="button" onclick="adicionarItem()">Adicionar</button>

            <hr>

            
            <table id="carrinho">
                <tr>
                    <th>Produto</th>
                    <th>Qtd</th>
                    <th>Total</th>
                </tr>
            </table>

            <!-- TOTAL -->
            <h3 id="total">Total: R$ 0,00</h3>

            <!-- DATA -->
            <label>Data:</label>
            <input type="date" name="data" required>

            <button type="submit" class="btn-green">Finalizar Venda</button>

        </form>

    </div>

  
    <div class="right card">

        <h3>Vendas Realizadas</h3>

        <!-- FILTRO -->
        <div class="filtros">
            <input placeholder="Buscar produto">
            <input type="date">
        </div>

        <!-- TABELA -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>

                <!-- EXEMPLO -->
                <tr>
                    <td>1</td>
                    <td>Notebook</td>
                    <td>2</td>
                    <td>20/05/2026</td>
                    <td>
                        <button>Editar</button>
                        <button>Excluir</button>
                    </td>
                </tr>

            </tbody>
        </table>

    </div>

</div>

</body>
<script>
function adicionarItem() {

    let select = document.getElementById("produto");
    let nome = select.options[select.selectedIndex].text;
    let preco = select.options[select.selectedIndex].getAttribute("data-preco");
    let id = select.value;

    let qtd = document.getElementById("quantidade").value;

    if (id === "" || qtd <= 0) {
        alert("Selecione um produto e quantidade");
        return;
    }

    let subtotal = preco * qtd;

    let tabela = document.getElementById("carrinho");

    let linha = tabela.insertRow();

    linha.insertCell(0).innerText = nome;
    linha.insertCell(1).innerText = qtd;
    linha.insertCell(2).innerText = "R$ " + subtotal.toFixed(2);

    // enviar pro PHP
    linha.insertCell(3).innerHTML = `
        <input type="hidden" name="produto_id[]" value="${id}">
        <input type="hidden" name="quantidade[]" value="${qtd}">
    `;

    atualizarTotal();

    document.getElementById("quantidade").value = "";
}

function atualizarTotal() {
    let tabela = document.getElementById("carrinho");
    let total = 0;

    for (let i = 1; i < tabela.rows.length; i++) {
        let valor = tabela.rows[i].cells[2].innerText.replace("R$", "");
        total += parseFloat(valor);
    }

    document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);
}
</script>
</html>
