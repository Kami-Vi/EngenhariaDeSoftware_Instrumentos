<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro - Loja</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e9e7e3;
}

.header {
    background: rgb(75,0,0);
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#voltar {
    color: white;
    text-decoration: none;
}

.logo-area img {
    height: 80px;
}

.titulo-header {
    font-size: 20px;
    font-weight: bold;
    flex: 1;
    text-align: center;
}

.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.left {
    width: 300px;
}

.right {
    flex: 1;
}

input,
select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.btn-green {
    background: rgb(117,0,0);
    color: white;
}

.btn-edit {
    background: orange;
    color: white;
}

.btn-delete {
    background: red;
    color: white;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th,
td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

th {
    background: #f0f0f0;
}

.filtros {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.filtros input {
    flex: 1;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="/logo.png" alt="Logo">
    </div>

    <div class="titulo-header">
        Cadastro de Usuários
    </div>

    <a href="/index.html" id="voltar">Voltar ao início</a>
</div>

<div class="container">

    <!-- FORMULÁRIO -->
    <div class="left card">
        <h3>Cadastrar / Editar</h3>

        <form id="formCadastro">

            <input
                type="text"
                id="nome"
                placeholder="Nome"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="text"
                id="cpf"
                placeholder="CPF"
                maxlength="14"
                required
            >
            
            <input
                type="text"
                id="telefone"
                placeholder="Telefone"
                maxlength="15"
                required
            >
           
            

            <select id="categoria" required>
                <option value="">Categoria</option>
                <option value="Cliente">Cliente</option>
                <option value="Funcionário">Funcionário</option>
            </select>

            <button type="submit" class="btn-green">
                Salvar
            </button>

        </form>
    </div>

    <!-- LISTA -->
    <div class="right card">

        <div class="filtros">
            <input
                type="text"
                id="buscaNome"
                placeholder="Buscar por nome"
            >

            <input
                type="text"
                id="buscaCpf"
                placeholder="Buscar por CPF"
            >
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>CPF</th>
                    <th>Telefone</th>
                    <th>Categoria</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabela"></tbody>
        </table>

    </div>

</div>


<script>

document.addEventListener("DOMContentLoaded", () => {

    const cpfInput = document.getElementById("cpf");
    const telefoneInput = document.getElementById("telefone");
    const form = document.getElementById("formCadastro");

    // Máscara CPF
    cpfInput.addEventListener("input", function () {

        let valor = this.value.replace(/\D/g, "");

        if (valor.length > 11) {
            valor = valor.substring(0, 11);
        }

        valor = valor.replace(/^(\d{3})(\d)/, "$1.$2");
        valor = valor.replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3");
        valor = valor.replace(/\.(\d{3})(\d)/, ".$1-$2");

        this.value = valor;
    });

    // Máscara Telefone
    telefoneInput.addEventListener("input", function () {

        let valor = this.value.replace(/\D/g, "");

        if (valor.length > 11) {
            valor = valor.substring(0, 11);
        }

        if (valor.length <= 10) {
            valor = valor.replace(
                /^(\d{2})(\d{4})(\d{0,4})$/,
                "($1) $2-$3"
            );
        } else {
            valor = valor.replace(
                /^(\d{2})(\d{5})(\d{0,4})$/,
                "($1) $2-$3"
            );
        }

        this.value = valor;
    });

    // Validação do formulário
    form.addEventListener("submit", function(event) {

        const nome = document.getElementById("nome").value.trim();
        const email = document.getElementById("email").value.trim();
        const cpf = cpfInput.value.replace(/\D/g, "");
        const telefone = telefoneInput.value.replace(/\D/g, "");
        const categoria = document.getElementById("categoria").value;

        // Campos vazios
        if (
            nome === "" ||
            email === "" ||
            cpf === "" ||
            telefone === "" ||
            categoria === ""
        ) {
            alert("Preencha todos os campos!");
            event.preventDefault();
            return;
        }

        // CPF deve ter exatamente 11 números
        if (cpf.length !== 11) {
            alert("CPF inválido! Digite os 11 números do CPF.");
            event.preventDefault();
            return;
        }

        // Telefone deve ter 10 ou 11 números
        if (telefone.length < 10 || telefone.length > 11) {
            alert("Telefone inválido! Digite um telefone com 10 ou 11 números.");
            event.preventDefault();
            return;
        }

    });

});
</script>


<script src="pessoa.js"></script>


</body>
</html>
