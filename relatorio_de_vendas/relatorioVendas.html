<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard de Vendas</title>

<link rel="stylesheet" href="relatorio.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- HEADER PADRÃO DO SISTEMA -->
<div class="header">

    <div class="logo-area">
        <img src="/logo.png" alt="Logo">
    </div>

    <div class="titulo-header">
        Dashboard de Vendas
    </div>

    <div>
        <a id="voltar" href="/index.html">Voltar ao início</a>
    </div>

</div>

<!-- CONTAINER PADRÃO -->
<div class="container">

    <div class="right">

        <!-- KPIs (MESMO ESTILO DO SISTEMA) -->
        <div class="stats">

            <div class="stat">
                <h2 id="totalVendido">R$ 0</h2>
                <small>Total vendido</small>
            </div>

            <div class="stat">
                <h2 id="totalItens">0</h2>
                <small>Itens vendidos</small>
            </div>

            <div class="stat">
                <h2 id="totalVendas">0</h2>
                <small>Total de vendas</small>
            </div>

            <div class="stat">
                <h2 id="topProduto">-</h2>
                <small>Mais vendido</small>
            </div>

        </div>

        <!-- GRÁFICO 1 -->
        <div class="card">
            <h3>Vendas por dia</h3>
            <canvas id="graficoVendas"></canvas>
        </div>

        <!-- GRÁFICO 2 -->
        <div class="card">
            <h3>Produtos mais vendidos</h3>
            <canvas id="graficoProdutos"></canvas>
        </div>

        <!-- GRÁFICO 3 -->
        <div class="card">
            <h3>Formas de pagamento</h3>
            <canvas id="graficoPagamento"></canvas>
        </div>

        <!-- TABELA -->
        <div class="card">
            <h3>Histórico de vendas</h3>

            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Total</th>
                        <th>Pagamento</th>
                    </tr>
                </thead>

                <tbody id="tabelaVendas"></tbody>
            </table>

        </div>

    </div>

</div>

<script src="relatorio.js"></script>

</body>
</html>
