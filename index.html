<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Instrumentos</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">

    <img src="/logo.png" alt="Logo" class="logo">

    <ul>
        <li><a href="/cadastro_de_produtos/cadastroDeProdutos.html">Cadastro de Produtos</a></li>
        <li><a href="/cadastro_de_fornecedores/fornecedores.html">Fornecedores</a></li>
        <li><a href="/cadastro_de_pessoa/cadastroDePessoas.html">Cadastro de Usuário</a></li>
        <li><a href="/relatorio_de_vendas/relatorioVendas.html">Relatório de vendas</a></li>
        <li><a href="/cadastro_de_vendas/cadastro_de_vendas.html">Cadastro de vendas</a></li>
    </ul>

</aside>

<!-- CONTEÚDO -->
<main class="main">

    <!-- CARDS -->
    <section class="cards">

        <div class="card">
            <h3>Vendas</h3>
            <p>67.345</p>
        </div>

        <div class="card">
            <h3>Clientes</h3>
            <p>2.343</p>
        </div>

        <div class="card">
            <h3>Pedidos</h3>
            <p>35.343</p>
        </div>

    </section>

    <!-- MURAL -->
    <section class="quadro-container">

        <h2>Mural de Avisos</h2>

        <!-- FORMULÁRIO -->
        <div class="card-aviso">

            <h3>Novo Aviso</h3>

            <label>Título</label>
            <input type="text" id="tituloAviso">

            <label>Mensagem</label>
            <textarea id="mensagemAviso"></textarea>

            <label>Quem escreveu</label>
            <select id="autorAviso">
                <option value="">Selecione o funcionário</option>
            </select>

            <button class="btn-green" onclick="salvarAviso()">
                Salvar Aviso
            </button>

        </div>

        <!-- LISTA -->
        <div id="listaAvisos"></div>

    </section>

</main>

<script src="index.js"></script>

</body>
</html>
