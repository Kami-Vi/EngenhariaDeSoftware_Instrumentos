<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MúsicaPro</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="/logo.png" alt="Logo">
    </div>
    <div class="titulo-header">Cadastro de Vendas</div>
    <a id="voltar" href="/index.html">Voltar ao início</a>
</div>

<div class="container">

    <div class="left card">

        <h3>Nova venda</h3>

        <form action="salvar_venda.php" method="POST">

            <label>Cliente:</label>
            <select id="cliente"> <option value="">Selecione o cliente</option> </select>

            <label>Produto:</label>
            <select id="produto"> <option value="">Selecione o produto</option> </select>
            <label>Quantidade:</label>
            <input type="number" id="quantidade" min="1">

            <button type="button" onclick="adicionarItem()">Adicionar</button>

            <hr>

            <table id="carrinho">
                <tr>
                    <th>Produto</th>
                    <th>Qtd</th>
                    <th>Total</th>
                </tr>
            </table>

            <h3 id="total">Total: R$ 0,00</h3>

            <label>Forma de Pagamento:</label>
            <select id="categoria">
                <option value="">selecione</option>
                <option value="Credito">Credito</option>
                <option value="Debito">Debito</option>
                <option value="Dinheiro">Dinheiro</option>
                <option value="Pix">Pix</option>
            </select>

            <label>Data:</label>
            <input type="date" name="data" required>

            <button type="submit" class="btn-green">Finalizar Venda</button>

        </form>

    </div>

    <div class="right card">

        <h3>Vendas Realizadas</h3>

        
    <div class="filtros">
        <input
            id="buscarProduto"
            placeholder="Buscar produto"
            onkeyup="filtrarVendas()"
        >
        <input
            id="buscarData"
            type="date"
            onchange="filtrarVendas()"
        >
    </div>



        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Data</th>
                    <th>Forma de Pagamento</th>
                    <th>Ações</th>
                    
                </tr>
            </thead>

            <tbody id="tabela-vendas">
                <!-- <tr>
                    <td>1</td>
                    <td>Notebook</td>
                    <td>2</td>
                    <td>20/05/2026</td>
                    <td>
                        <button>Editar</button>
                        <button>Excluir</button>
                    </td>
                </tr> -->
            </tbody>
        </table>

    </div>

</div>

</body>

<script src="vendas.js"></script>

</html>
