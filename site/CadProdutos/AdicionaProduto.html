<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adicionar Produto</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: white;
      color: #333;
    }

    header {
      background-color: #f8c8dc;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    .form-container {
      background: #fff;
      max-width: 600px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 15px;
      border: 3px solid #f8c8dc;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #4B3621;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #f8c8dc;
      color: #000;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
      transition: 0.3s;
    }

    button:hover {
      background-color: #f3a9ca;
    }
  </style>
</head>
<body>

  <header>Adicionar Novo Produto</header>

  <div class="form-container">
    <h2>Cadastro de Produto</h2>
    <form>
      <label>Nome do Produto:</label>
      <input type="text" placeholder="Digite o nome do produto" required>

      <label>Categoria:</label>
      <input type="text" placeholder="Ex: Casinha de Jardim" required>

      <label>Preço:</label>
      <input type="number" step="0.01" placeholder="Digite o preço" required>

      <label>Estoque:</label>
      <input type="number" placeholder="Quantidade disponível" required>

      <label>Descrição:</label>
      <textarea rows="4" placeholder="Descreva o produto..."></textarea>

      <label>Imagem do Produto:</label>
      <input type="file" accept="image/*">

      <button type="submit">Salvar Produto</button>
    </form>
  </div>

</body>
</html>
