<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Concluído</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: black;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background-color: #f8c8dd;
      padding: 20px;
      font-size: 1.8rem;
      font-weight: bold;
      color: black;
    }

    .container {
      max-width: 500px;
      margin: 50px auto;
      padding: 30px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0px 0px 15px #f8c8dd80;
    }

    .checkmark {
      font-size: 5rem;
      color: #f8c8dd;
      margin: 20px 0;
    }

    h2 {
      color: #f8c8dd;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background-color: #f8c8dd;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      color: black;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #f8c8dd;
    }
  </style>
</head>
<body>
  <header>Pagamento Concluído</header>

  <div class="container">
    <div class="checkmark">✅</div>
    <h2>Obrigado pela sua compra!</h2>
    <p>Seu pagamento foi processado com sucesso.</p>
    <a href="../CadProdutos/CrudProdutos.html" class="btn">⬅ Voltar para Loja</a>
  </div>
</body>
</html>
