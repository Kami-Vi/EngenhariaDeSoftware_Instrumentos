<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Pagamento</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
    }

    /* Navbar */
    .navbar {
      display: flex;
      align-items: center;
      background-color: #f8c8dd;
      padding: 10px 20px;
    }

    .navbar .logo img {
      height: 80px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 15px;
      margin-left: auto;
    }

    .nav-links li a {
      text-decoration: none;
      color: black;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 5px;
    }

    .nav-links li a:hover {
      background-color: #ffe6f0;
    }

    /* Container do formulário */
    .container {
      max-width: 500px;
      background: #ffffff;
      margin: 40px auto;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0px 0px 15px #f8c8dd80;
    }

    h2 {
      text-align: center;
      color: #f8c8dd;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #f8c8dd;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background-color: #f8c8dd;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    .btn:hover {
      background-color: #ff99cc;
      color: white;
    }

    .btn-voltar {
      text-decoration: none;
      display: inline-block;
      margin-bottom: 15px;
      color: #ff66b2;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <img src="../../fabrica_de_casinhas_branca.png" alt="Logo da Empresa">
    </div>
    <ul class="nav-links">
      <li><a href="../CadProdutos/CrudProdutos.html">Início</a></li>
      <li><a href="../Cadcliente/Crud clientes/CrudCliente.html">Clientes</a></li>
      <li><a href="../CadProdutos/CrudProdutos.html">Produtos</a></li>
      <li><a href="../Cadatendimento/atendimento.html">Contato</a></li>
    </ul>
  </nav>

  <div class="container">
    <a href="./Escolherpagamento.html" class="btn-voltar">⬅ Voltar</a>
    <h2>Novo Pagamento</h2>
    <form>
      <label>Forma de Pagamento</label>
      <select>
        <option value="cartao">Cartão</option>
        <option value="pix">Pix</option>
        <option value="boleto">Boleto</option>
      </select>

      <label>Descrição</label>
      <input type="text" placeholder="Descrição do pagamento">

      <button type="submit" class="btn">Adicionar Pagamento</button>
    </form>
  </div>

</body>
</html>
