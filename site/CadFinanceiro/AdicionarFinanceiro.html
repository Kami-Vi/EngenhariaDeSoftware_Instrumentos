<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adicionar Lançamento</title>
  <link rel="stylesheet" href="Financeiro.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <img src="../fabrica_de_casinhas_branca.png" alt="Logo">
    </div>
    <ul class="nav-links">
      <li><a href="../index.html">Início</a></li>
      <li><a href="../CadPedidos/CrudPedidos.html">Pedidos</a></li>
      <li><a href="../Cadcliente/Crud clientes/CrudCliente.html">Clientes</a></li>
      <li><a href="../CadProdutos/CrudProdutos.html">Produtos</a></li>
      <li><a href="#">Financeiro</a></li>
    </ul>
  </nav>

  <div class="form-container">
    <h2>Adicionar Lançamento Financeiro</h2>
    <form>
      <label for="data">Data:</label>
      <input type="date" id="data" name="data" required>

      <label for="descricao">Descrição:</label>
      <input type="text" id="descricao" name="descricao" placeholder="Ex: Pagamento fornecedor" required>

      <label for="tipo">Tipo:</label>
      <select id="tipo" name="tipo" required>
        <option value="receita">Receita</option>
        <option value="despesa">Despesa</option>
      </select>

      <label for="categoria">Categoria:</label>
      <input type="text" id="categoria" name="categoria" placeholder="Ex: Materiais, Vendas" required>

      <label for="valor">Valor:</label>
      <input type="text" id="valor" name="valor" placeholder="R$ 0,00" required>

      <label for="pagamento">Forma de Pagamento:</label>
      <select id="pagamento" name="pagamento">
        <option>Pix</option>
        <option>Cartão</option>
        <option>Boleto</option>
        <option>Dinheiro</option>
      </select>

      <label for="obs">Observações:</label>
      <textarea id="obs" name="obs" rows="3" placeholder="Detalhes adicionais..."></textarea>

      <button type="submit" class="btn-salvar">Salvar Lançamento</button>
    </form>
  </div>
</body>
</html>
