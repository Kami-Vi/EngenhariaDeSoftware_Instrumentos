<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Entrar</title>
  <link rel="stylesheet" href="Entrar.css">
</head>
<body>

  <!-- Barra de Navegação -->
  <nav class="navbar">
    <div class="logo">
      <img src="../../fabrica_de_casinhas_branca.png" alt="Logo" />
    </div>
  </nav>

  <!-- Formulário de Login -->
  <div class="form-container">
    <h2>Entrar</h2>
    <form>

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="Ex: joao@email.com">

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

      <p class="register-link">Não tem cadastro? <a href="../Cadastro Cliente/CadCliente.html">Cadastre-se</a></p>

      <!-- Botão Entrar para ir ao CRUD -->
      <a href="../Crud clientes/CrudCliente.html" class="btn-entrar">Entrar</a>
    </form>
  </div>

</body>
</html>
