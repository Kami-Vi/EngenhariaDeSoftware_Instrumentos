<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MúsicaPro</title>
<link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.png" alt="Logo">
    </div>
    <div class="titulo-header">Cadastro de Produtos</div>
    <a id="voltar" href="./index.html">Voltar ao início</a>
</div>

<div class="container">

<!-- LEFT -->
<div class="left card">
    <h3>Novo Produto</h3>

    <input id="nome" placeholder="Nome do produto">
    <input id="marca" placeholder="Marca">
    <input id="quantidade" placeholder="Quantidade" type="number" min="1">

    <select id="categoria">
        <option value="">Categoria</option>
        <option value="Instrumento">Instrumento</option>
        <option value="Acessório">Acessório</option>
    </select>

    <input id="tipo" placeholder="Tipo">
    <textarea id="especificacoes" placeholder="Especificações"></textarea>

    <input id="fornecedor" placeholder="Fornecedor">
    <input id="garantia" placeholder="Garantia">
    <input id="contato" placeholder="Contato">

    <button class="btn-green" onclick="salvarProduto()">Salvar Produto</button>
</div>

<!-- RIGHT -->
<div class="right">

    <!-- STATS -->
    <div class="stats">
        <div class="stat">
            <h2 id="total">0</h2>
            <small>Total</small>
        </div>
        <div class="stat">
            <h2 id="instrumentos">0</h2>
            <small>Instrumentos</small>
        </div>
        <div class="stat">
            <h2 id="acessorios">0</h2>
            <small>Acessórios</small>
        </div>
    </div>

    <!-- FILTRO -->
    <div class="card filtros">
        <input id="busca" placeholder="Buscar..." onkeyup="filtrar()">
    </div>

    <!-- TABELA -->
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Marca</th>
                    <th>Categoria</th>
                    <th>Tipo</th>
                    <th>Fornecedor</th>
                    <th>Garantia</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>

</div>
</div>

<script src="products.js"></script>

</body>
</html>
