<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MúsicaPro</title>

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    font-family: Arial;
    background:#e9e7e3;
}

/* HEADER */
.header {
    background:#1d4d2c;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
}

/* GRID */
.container {
    display:flex;
    padding:20px;
    gap:20px;
}

/* CARD */
.card {
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* LEFT */
.left {
    width:300px;
}

/* RIGHT */
.right {
    flex:1;
}

/* INPUTS */
input, select, textarea {
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

/* BUTTON */
button {
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.btn-green {
    background:#1d4d2c;
    color:white;
}

/* STATS */
.stats {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.stat {
    flex:1;
    text-align:center;
    padding:15px;
    border-radius:10px;
    background:#f4f4f4;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th {
    background:#f0f0f0;
}

/* FILTER */
.filtros {
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.filtros input {
    flex:1;
}
</style>
</head>

<body>

<div class="header">
    <div><b>MúsicaPro</b></div>
    <div>Sistema de Gestão de Produtos</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="left card">
    <h3>Novo Produto</h3>

    <input id="nome" placeholder="Nome do produto">
    <input id="marca" placeholder="Marca">

    <select id="categoria">
        <option value="">Categoria</option>
        <option value="Instrumento">Instrumento</option>
        <option value="Acessório">Acessório</option>
    </select>

    <input id="tipo" placeholder="Tipo">
    <textarea id="especificacoes" placeholder="Especificações"></textarea>

    <input id="fornecedor" placeholder="Fornecedor">
    <input id="garantia" placeholder="Garantia">
    <input id="contato" placeholder="Contato">

    <button class="btn-green" onclick="salvarProduto()">Salvar Produto</button>
</div>

<!-- RIGHT -->
<div class="right">

    <!-- STATS -->
    <div class="stats">
        <div class="stat">
            <h2 id="total">0</h2>
            <small>Total</small>
        </div>
        <div class="stat">
            <h2 id="instrumentos">0</h2>
            <small>Instrumentos</small>
        </div>
        <div class="stat">
            <h2 id="acessorios">0</h2>
            <small>Acessórios</small>
        </div>
    </div>

    <!-- FILTRO -->
    <div class="card filtros">
        <input id="busca" placeholder="Buscar..." onkeyup="filtrar()">
    </div>

    <!-- TABELA -->
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Marca</th>
                    <th>Categoria</th>
                    <th>Tipo</th>
                    <th>Fornecedor</th>
                    <th>Garantia</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>

</div>
</div>

<script>

let produtos = [];

// ================= CARREGAR =================
function carregarProdutos() {
    fetch("api.php")
    .then(r => r.json())
    .then(data => {

        produtos = data.map(p => ({
            id: p.idProdutos,
            nome: p.Tipo || "Produto",
            marca: p.Marca,
            categoria: p.Categoria,
            tipo: p.Tipo,
            especificacoes: p.Especificacoes,
            fornecedor: p.NomeEmpresa,
            garantia: p.Garantia
        }));

        atualizarStats();
        render(produtos);
    });
}

// ================= STATS =================
function atualizarStats(){
    total.innerText = produtos.length;

    instrumentos.innerText = produtos.filter(p => p.categoria === "Instrumento").length;
    acessorios.innerText = produtos.filter(p => p.categoria === "Acessório").length;
}

// ================= RENDER =================
function render(lista) {
    tabela.innerHTML = "";

    if(lista.length === 0){
        tabela.innerHTML = `<tr><td colspan="7">Nenhum produto encontrado</td></tr>`;
        return;
    }

    lista.forEach(p => {
        tabela.innerHTML += `
        <tr>
        <td>${p.nome}</td>
        <td>${p.marca}</td>
        <td>${p.categoria}</td>
        <td>${p.tipo}</td>
        <td>${p.fornecedor}</td>
        <td>${p.garantia || "-"}</td>
        <td>
            <button onclick="excluir(${p.id})">X</button>
        </td>
        </tr>`;
    });
}

// ================= SALVAR =================
function salvarProduto() {

    let produto = {
        nome: nome.value,
        marca: marca.value,
        categoria: categoria.value,
        tipo: tipo.value,
        especificacoes: especificacoes.value,
        fornecedor: fornecedor.value,
        garantia: garantia.value,
        contato: contato.value
    };

    fetch("api.php", {
        method: "POST",
        body: JSON.stringify(produto)
    })
    .then(() => {
        limpar();
        carregarProdutos();
    });
}

// ================= EXCLUIR =================
function excluir(id) {

    if (!confirm("Excluir?")) return;

    fetch("api.php?id=" + id, {
        method: "DELETE"
    })
    .then(() => carregarProdutos());
}

// ================= FILTRO =================
function filtrar() {

    let termo = busca.value.toLowerCase();

    let filtrado = produtos.filter(p =>
        p.nome.toLowerCase().includes(termo) ||
        p.marca.toLowerCase().includes(termo) ||
        p.categoria.toLowerCase().includes(termo)
    );

    render(filtrado);
}

// ================= LIMPAR =================
function limpar() {
    nome.value = "";
    marca.value = "";
    categoria.value = "";
    tipo.value = "";
    especificacoes.value = "";
    fornecedor.value = "";
    garantia.value = "";
    contato.value = "";
}

// ================= INIT =================
carregarProdutos();

</script>

</body>
</html>
